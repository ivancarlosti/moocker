name: Build Moodle Docker Image

on:
  schedule:
    - cron: '0 3 * * *' # Todo dia as 03:00 UTC
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch Latest Moodle Release Tag
        id: moodle_version
        run: |
          # Fetch the latest stable Moodle version tag, assuming format like v4.3.3
          LATEST_TAG=$(git ls-remote --tags https://github.com/moodle/moodle.git | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "Error fetching latest Moodle version."
            exit 1
          fi
          echo "Latest Moodle Tag is: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Get Last Pushed Docker Tag
        id: docker_version
        continue-on-error: true
        run: |
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:${{ github.repository }}:pull" | jq -r .token)
          LAST_TAG=$(curl -H "Authorization: Bearer $TOKEN" -s "https://ghcr.io/v2/${{ github.repository }}/tags/list" | jq -r '.tags[]' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Determine if build is needed
        id: build_check
        run: |
          LATEST="${{ steps.moodle_version.outputs.tag }}"
          LAST="${{ steps.docker_version.outputs.last_tag }}"
          echo "Latest Moodle: $LATEST"
          echo "Last Built Docker: $LAST"
          
          if [ "$LATEST" != "$LAST" ]; then
            echo "New version found. Building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "Docker tag matches latest Moodle version. No build needed."
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          
          # Force build on workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.build_check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.build_check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.build_check.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            MOODLE_VERSION=${{ steps.moodle_version.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.moodle_version.outputs.tag }}
